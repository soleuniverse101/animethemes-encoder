name: Prepare environment
description: Setup Node.js & pnpm

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Setup pnpm with version set in ~/package.json/packageManager
      uses: pnpm/action-setup@v6
    - run: pnpm ci
      shell: bash

    # Note that a Rust toolchain is installed by default on Github Actions runners.

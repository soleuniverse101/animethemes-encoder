name: Release

on:
  push:
    branches: ["main"]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Prepare environment
        uses: ./.github/actions/prepare-env

      - name: Create Release PR
        uses: changesets/action@v1
